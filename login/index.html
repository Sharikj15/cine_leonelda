<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Cine Leonelda</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Estilos específicos para la página de login */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body.login-page {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 15px;
        }

        body.login-page::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, rgba(211, 47, 47, 0.05) 0%, rgba(211, 47, 47, 0.02) 100%);
            pointer-events: none;
            z-index: 0;
        }

        .main-content {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
        }

        .login-container {
            max-width: none;
            margin: 0;
            padding: 0;
            background: transparent;
            border-radius: 0;
            box-shadow: none;
        }

        .login-form-wrapper {
            width: 100%;
        }

        /* Animación de entrada */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            animation: slideUp 0.6s ease-out;
            background: #262626;
            border: 1px solid #3a3a3a;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 25px 20px;
                border-radius: 10px;
            }
        }
    </style>
</head>

<body class="login-page">
    <div class="main-content login-container">
        <div class="login-form-wrapper">
            <div class="login-card">
                <!-- Header del login -->
                <div class="login-header">
                    <h2><i class="fas fa-film"></i> Cine Leonelda</h2>
                    <p>Iniciar Sesión</p>
                </div>

                <!-- Mensajes de estado -->
                <div id="sessionExpiredMessage" class="status-message" style="display: none;">
                    <i class="fas fa-exclamation-circle"></i> Tu sesión expiró. Por favor, inicia sesión nuevamente.
                </div>
                <div id="errorMessage" class="error-message" style="display: none;"></div>
                <div id="successMessage" class="success-message" style="display: none;"></div>

                <!-- Formulario de login -->
                <form id="loginForm" class="login-form">
                    <!-- Campo de usuario -->
                    <div class="form-group">
                        <label for="username">
                            <span class="label-text"><i class="fas fa-user"></i> Usuario</span>
                            <span class="required">*</span>
                        </label>
                        <div class="input-wrapper">
                            <input 
                                type="text" 
                                id="username" 
                                name="username" 
                                placeholder="Ingresa tu usuario"
                                required
                                data-rules="username,minlength:3"
                                autocomplete="username"
                            >
                        </div>
                        <span class="field-error-message"></span>
                    </div>

                    <!-- Campo de contraseña -->
                    <div class="form-group">
                        <label for="password">
                            <span class="label-text"><i class="fas fa-lock"></i> Contraseña</span>
                            <span class="required">*</span>
                        </label>
                        <div class="input-wrapper">
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                placeholder="Ingresa tu contraseña"
                                required
                                data-rules="minlength:6"
                                autocomplete="current-password"
                            >
                            <button type="button" class="toggle-password" aria-label="Mostrar/ocultar contraseña">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <span class="field-error-message"></span>
                    </div>

                    <!-- Información de prueba -->
                    <div class="demo-info">
                        <p><strong><i class="fas fa-info-circle"></i> Credenciales de prueba:</strong></p>
                        <p><code>admin</code> / <code>admin123</code></p>
                        <p><code>user</code> / <code>user123</code></p>
                    </div>

                    <!-- Botón de envío -->
                    <button type="submit" class="login-button" id="submitBtn">
                        <span class="button-loader" style="display: none;">
                            <i class="fas fa-spinner fa-spin"></i>
                        </span>
                        <span class="button-text">Iniciar Sesión</span>
                    </button>
                </form>

                <!-- Footer del login -->
                <div class="login-footer">
                    <p class="login-hint">
                        <i class="fas fa-lightbulb"></i> ¿Primera vez? Usa las credenciales de prueba arriba.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts de autenticación (rutas relativas correctas) -->
    <script src="../js/auth.js"></script>
    <script src="../js/form-validator.js"></script>
    <script src="../js/login.js"></script>
</body>

</html>
